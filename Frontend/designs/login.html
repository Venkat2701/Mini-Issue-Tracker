<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#40a4b5",
                        "background-light": "#f6f7f8",
                        "background-dark": "#141c1e",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Login - Mini Issue Tracker</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<header class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 px-6 py-4 lg:px-20">
<div class="flex items-center gap-3 text-primary">
<div class="size-6">
<svg fill="currentColor" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M24 4C25.7818 14.2173 33.7827 22.2182 44 24C33.7827 25.7818 25.7818 33.7827 24 44C22.2182 33.7827 14.2173 25.7818 4 24C14.2173 22.2182 22.2182 14.2173 24 4Z"></path>
</svg>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight">Mini Issue Tracker</h2>
</div>
<div class="flex items-center gap-4">
<button class="text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">Help</button>
<button class="text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">Support</button>
</div>
</header>
<main class="flex flex-1 items-center justify-center px-4 py-12">
<div class="w-full max-w-md">
<div class="mb-8 text-center">
<h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-slate-100">Welcome Back</h1>
<p class="mt-2 text-slate-600 dark:text-slate-400">Please enter your credentials to continue tracking issues.</p>
</div>
<div class="bg-white dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl shadow-xl overflow-hidden">
<div class="h-32 w-full bg-gradient-to-br from-primary/20 to-primary/5 flex items-center justify-center" data-alt="Abstract blue and dark teal geometric background" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuD-15YlYQ-vkoeJE937_fTa3JZ0YssHPCl54qTmNlv1Yym3AuP9Mt_ZlKuVTGCJRPM6mdN8KJhBYSVBK5aG7KubhpGSu7mCirMc4RbyUzmt8kBoBOsbFgXU8oP4r5wlGx7q-KI9AgHUN9VucqFfPM7mXEi0FLi4ckQ2-sStQQSzkqZndYxB2vUxRzo2UP3laI5o6dolA_-rQ5gaMDYkMzagEbdQGV7ZSrMTWEzzEeb6g07X0xWRTd2zVHVxMkD0ty131Yw3i8O1Ob3I'); background-size: cover; background-position: center;">
<div class="bg-background-dark/40 backdrop-blur-sm p-3 rounded-full">
<span class="material-symbols-outlined text-primary text-4xl">lock_open</span>
</div>
</div>
<form class="p-8 space-y-6">
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
<input class="block w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<div>
<div class="flex items-center justify-between mb-1.5">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">key</span>
<input class="block w-full pl-10 pr-12 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<div class="flex items-center">
<input class="h-4 w-4 rounded border-slate-300 dark:border-slate-700 text-primary focus:ring-primary bg-white dark:bg-slate-800" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-slate-600 dark:text-slate-400" for="remember-me">Remember me for 30 days</label>
</div>
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all uppercase tracking-wider" type="submit">
                                Sign In
                            </button>
</form>
<div class="px-8 pb-8 text-center">
<p class="text-sm text-slate-600 dark:text-slate-400">
                                Don't have an account? 
                                <a class="font-semibold text-primary hover:underline" href="#">Request Access</a>
</p>
</div>
</div>
<footer class="mt-8 text-center text-xs text-slate-500 dark:text-slate-500">
                        © 2024 Mini Issue Tracker. All rights reserved.
                    </footer>
</div>
</main>
</div>
</div>
</body></html>
