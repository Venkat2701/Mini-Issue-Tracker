<div class="layout-wrapper">
    <header class="main-header">
        <div class="header-left">
            <div class="logo-box">
                <svg fill="currentColor" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M24 4C25.7818 14.2173 33.7827 22.2182 44 24C33.7827 25.7818 25.7818 33.7827 24 44C22.2182 33.7827 14.2173 25.7818 4 24C14.2173 22.2182 22.2182 14.2173 24 4Z">
                    </path>
                </svg>
            </div>
            <h2 class="app-title">Mini Issue Tracker</h2>
        </div>

        <div class="header-right">
            <button mat-icon-button (click)="toggleTheme()"
                [matTooltip]="themeService.isDark ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
                class="theme-toggle">
                <mat-icon>{{ themeService.isDark ? 'light_mode' : 'dark_mode' }}</mat-icon>
            </button>
            <div class="user-info" *ngIf="currentUser">
                <div class="user-text">
                    <p class="user-name">{{ userName }}</p>
                    <p class="user-role">{{ userRole || 'User' }}</p>
                </div>
                <div class="user-avatar">
                    <mat-icon>account_circle</mat-icon>
                </div>
                <button mat-icon-button class="logout-btn" (click)="logout()" matTooltip="Logout">
                    <mat-icon>logout</mat-icon>
                </button>
            </div>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <nav class="nav-links">
                <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
                    <mat-icon>dashboard</mat-icon>
                    <span>Dashboard</span>
                </a>
                <a routerLink="/issues" routerLinkActive="active" class="nav-item">
                    <mat-icon>assignment</mat-icon>
                    <span>Issues</span>
                </a>

                <a routerLink="/users" routerLinkActive="active" class="nav-item">
                    <mat-icon>group</mat-icon>
                    <span>Team Members</span>
                </a>
            </nav>

        </aside>

        <main class="content-area">
            <router-outlet></router-outlet>
        </main>
    </div>
</div>
