<div class="login-container">
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <button mat-icon-button (click)="toggleTheme()" class="theme-toggle-fixed"
        [matTooltip]="themeService.isDark ? 'Switch to Light Mode' : 'Switch to Dark Mode'">
        <mat-icon>{{ themeService.isDark ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>
    <mat-card class="login-card">
        <div class="header-image">
            <div class="icon-wrapper">
                <svg fill="currentColor" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M24 4C25.7818 14.2173 33.7827 22.2182 44 24C33.7827 25.7818 25.7818 33.7827 24 44C22.2182 33.7827 14.2173 25.7818 4 24C14.2173 22.2182 22.2182 14.2173 24 4Z">
                    </path>
                </svg>
            </div>
        </div>

        <mat-card-header>
            <mat-card-title>Welcome Back</mat-card-title>
            <mat-card-subtitle>Please enter your credentials to continue tracking issues.</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Email Address</mat-label>
                    <input matInput formControlName="email" placeholder="name@company.com" type="email">
                    <mat-icon matPrefix>mail</mat-icon>
                    <mat-error *ngIf="loginForm.get('email')?.hasError('email')">Please enter a valid email</mat-error>
                    <mat-error *ngIf="loginForm.get('email')?.hasError('required')">Email is required</mat-error>
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Password</mat-label>
                    <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'"
                        placeholder="••••••••">
                    <mat-icon matPrefix>key</mat-icon>
                    <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
                        <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
                    </button>
                    <mat-error *ngIf="loginForm.get('password')?.hasError('required')">Password is required</mat-error>
                </mat-form-field>



                <button mat-raised-button color="primary" class="full-width login-button" type="submit"
                    [disabled]="loginForm.invalid">
                    SIGN IN
                </button>
            </form>
        </mat-card-content>

        <mat-card-footer class="text-center">
            <p>Don't have an account? <a routerLink="/register" class="register-link">Request Access</a></p>
        </mat-card-footer>
    </mat-card>
</div>
