<div class="register-container">
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <button mat-icon-button (click)="toggleTheme()" class="theme-toggle-fixed"
        [matTooltip]="themeService.isDark ? 'Switch to Light Mode' : 'Switch to Dark Mode'">
        <mat-icon>{{ themeService.isDark ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>
    <mat-card class="register-card">
        <div class="header-image">
            <div class="icon-wrapper">
                <mat-icon>person_add</mat-icon>
            </div>
        </div>

        <mat-card-header>
            <mat-card-title>Create Account</mat-card-title>
            <mat-card-subtitle>Join the issue tracking system</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Full Name</mat-label>
                    <input matInput formControlName="fullName" placeholder="John Doe">
                    <mat-icon matPrefix>person</mat-icon>
                    <mat-error *ngIf="registerForm.get('fullName')?.hasError('required')">Name is required</mat-error>
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Email Address</mat-label>
                    <input matInput formControlName="email" placeholder="name@company.com" type="email">
                    <mat-icon matPrefix>mail</mat-icon>
                    <mat-error *ngIf="registerForm.get('email')?.hasError('email')">Please enter a valid
                        email</mat-error>
                    <mat-error *ngIf="registerForm.get('email')?.hasError('required')">Email is required</mat-error>
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Password</mat-label>
                    <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'"
                        placeholder="••••••••">
                    <mat-icon matPrefix>key</mat-icon>
                    <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
                        <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
                    </button>
                    <mat-error *ngIf="registerForm.get('password')?.hasError('required')">Password is
                        required</mat-error>
                    <mat-error *ngIf="registerForm.get('password')?.hasError('minlength')">Minimum 6 characters
                        required</mat-error>
                </mat-form-field>

                <button mat-raised-button color="primary" class="full-width login-button" type="submit"
                    [disabled]="registerForm.invalid">
                    REQUEST ACCESS
                </button>
            </form>
        </mat-card-content>

        <mat-card-footer class="text-center">
            <p>Already have an account? <a routerLink="/login" class="register-link">Sign In</a></p>
        </mat-card-footer>
    </mat-card>
</div>
