<h2 mat-dialog-title>{{ isEdit ? 'Edit Issue' : 'Create New Issue' }}</h2>

<mat-dialog-content>
    <form [formGroup]="issueForm" class="issue-form">
        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Title</mat-label>
            <input matInput formControlName="title" placeholder="Brief summary of the issue">
            <mat-error *ngIf="issueForm.get('title')?.hasError('required')">Title is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Description</mat-label>
            <textarea matInput formControlName="description" rows="4" placeholder="Detailed explanation..."></textarea>
        </mat-form-field>

        <div class="form-row">
            <mat-form-field appearance="outline">
                <mat-label>Status</mat-label>
                <mat-select formControlName="status">
                    <mat-option value="Open">Open</mat-option>
                    <mat-option value="In Progress">In Progress</mat-option>
                    <mat-option value="Closed">Closed</mat-option>
                </mat-select>
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Priority</mat-label>
                <mat-select formControlName="priority">
                    <mat-option value="High">High</mat-option>
                    <mat-option value="Medium">Medium</mat-option>
                    <mat-option value="Low">Low</mat-option>
                </mat-select>
            </mat-form-field>
        </div>

        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Assignee</mat-label>
            <mat-select formControlName="assigneeId">
                <mat-option [value]="null">Unassigned</mat-option>
                <mat-option *ngFor="let user of users" [value]="user.userId">
                    {{ user.fullName }}
                </mat-option>
            </mat-select>
        </mat-form-field>
    </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button (click)="onCancel()">Cancel</button>
    <button mat-flat-button color="primary" (click)="onSubmit()" [disabled]="issueForm.invalid">
        {{ isEdit ? 'Update Issue' : 'Create Issue' }}
    </button>
</mat-dialog-actions>
