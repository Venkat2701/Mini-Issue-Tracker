<div class="form-container">
    <div class="form-header">
        <h2 mat-dialog-title>{{ isEdit ? 'Edit User' : 'Add New User' }}</h2>
        <button mat-icon-button (click)="close()" class="close-btn">
            <mat-icon>close</mat-icon>
        </button>
    </div>

    <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
        <mat-dialog-content>
            <div class="form-grid">
                <mat-form-field appearance="outline">
                    <mat-label>Full Name</mat-label>
                    <input matInput formControlName="fullName" placeholder="Enter full name">
                    <mat-error *ngIf="userForm.get('fullName')?.hasError('required')">Name is required</mat-error>
                </mat-form-field>

                <mat-form-field appearance="outline">
                    <mat-label>Email Address</mat-label>
                    <input matInput formControlName="email" type="email" placeholder="example@mail.com">
                    <mat-error *ngIf="userForm.get('email')?.hasError('required')">Email is required</mat-error>
                    <mat-error *ngIf="userForm.get('email')?.hasError('email')">Invalid email format</mat-error>
                </mat-form-field>

                <mat-form-field appearance="outline">
                    <mat-label>{{ isEdit ? 'Change Password (Optional)' : 'Password' }}</mat-label>
                    <input matInput formControlName="password" type="password" placeholder="Min. 6 characters">
                    <mat-error *ngIf="userForm.get('password')?.hasError('required')">Password is required</mat-error>
                    <mat-error *ngIf="userForm.get('password')?.hasError('minlength')">Min. 6 characters
                        required</mat-error>
                </mat-form-field>

                <mat-form-field appearance="outline">
                    <mat-label>Role</mat-label>
                    <mat-select formControlName="role">
                        <mat-option value="User">User</mat-option>
                        <mat-option value="Admin">Admin</mat-option>
                    </mat-select>
                </mat-form-field>

                <mat-form-field appearance="outline">
                    <mat-label>Status</mat-label>
                    <mat-select formControlName="status">
                        <mat-option value="Active">Active</mat-option>
                        <mat-option value="Pending">Pending</mat-option>
                        <mat-option value="Inactive">Inactive</mat-option>
                    </mat-select>
                </mat-form-field>
            </div>
        </mat-dialog-content>

        <mat-dialog-actions align="end">
            <button mat-button type="button" (click)="close()">Cancel</button>
            <button mat-flat-button color="primary" type="submit" [disabled]="userForm.invalid || saving">
                {{ saving ? (isEdit ? 'Updating...' : 'Creating...') : (isEdit ? 'Update User' : 'Add User') }}
            </button>
        </mat-dialog-actions>
    </form>
</div>
